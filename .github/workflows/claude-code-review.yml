name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  claude-review:
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Check for existing Claude review
        id: check_review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.user.login == "claude[bot]" or .user.login == "claude")] | length')
          if [ "$COMMENTS" -gt 0 ]; then
            echo "Claude has already reviewed this PR ($COMMENTS comment(s) found). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing Claude review found. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_review.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        if: steps.check_review.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}
          track_progress: true
          claude_args: '--model claude-opus-4-6 --max-turns 15'
